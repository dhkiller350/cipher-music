<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Cipher Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(124,58,237,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 20%, rgba(0,212,255,0.08) 0%, transparent 55%),
        var(--bg-deep);
      padding: 32px 16px;
    }
    .auth-container { width: 100%; max-width: 440px; }
  </style>
</head>
<body class="dark-mode">

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <div class="auth-container">
    <div class="auth-card glass-card">

      <!-- Step 1: Enter email to receive reset code -->
      <div id="step-email">
        <div class="auth-logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <h1>Reset Password</h1>
          <p class="auth-subtitle">Enter your email to receive a reset code</p>
        </div>
        <form id="forgot-form" novalidate>
          <div class="form-group">
            <label for="forgot-email">Email Address</label>
            <input type="email" id="forgot-email" placeholder="Enter your account email" autocomplete="email" />
            <span class="field-error" id="err-forgot-email"></span>
          </div>
          <button type="submit" class="btn-primary btn-full" id="send-reset-btn">Send Reset Code</button>
          <p class="auth-footer">Remember your password? <a href="index.html">Sign In</a></p>
        </form>
      </div>

      <!-- Step 2: Enter the verification code -->
      <div id="step-verify" class="hidden">
        <div class="auth-logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.5">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <h1>Check Your Email</h1>
          <p class="auth-subtitle">We sent a password-reset code to</p>
          <p id="verify-email-display" class="verify-email-addr"></p>
        </div>

        <div id="demo-code-hint" class="verify-code-display hidden">
          <p class="verify-code-label">Your verification code</p>
          <p id="demo-code-value" class="verify-code-number"></p>
          <p class="verify-code-note">Enter this code in the boxes below</p>
        </div>

        <div class="otp-wrap">
          <div class="otp-inputs" id="otp-inputs">
            <input class="otp-box" maxlength="1" inputmode="numeric" pattern="\d" aria-label="Digit 1" />
            <input class="otp-box" maxlength="1" inputmode="numeric" pattern="\d" aria-label="Digit 2" />
            <input class="otp-box" maxlength="1" inputmode="numeric" pattern="\d" aria-label="Digit 3" />
            <input class="otp-box" maxlength="1" inputmode="numeric" pattern="\d" aria-label="Digit 4" />
            <input class="otp-box" maxlength="1" inputmode="numeric" pattern="\d" aria-label="Digit 5" />
            <input class="otp-box" maxlength="1" inputmode="numeric" pattern="\d" aria-label="Digit 6" />
          </div>
          <span class="field-error" id="err-otp"></span>
        </div>

        <button class="btn-primary btn-full" id="verify-btn">Verify Code</button>
        <p class="auth-footer">
          <a href="#" id="resend-code-link">Resend Code</a>
          &nbsp;·&nbsp;
          <a href="#" id="back-to-email-link">Change Email</a>
        </p>
      </div>

      <!-- Step 3: Set new password -->
      <div id="step-new-password" class="hidden">
        <div class="auth-logo">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.5">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <h1>New Password</h1>
          <p class="auth-subtitle">Choose a new password for your account</p>
        </div>
        <form id="reset-form" novalidate>
          <div class="form-group">
            <label for="reset-password">New Password</label>
            <div class="password-wrap">
              <input type="password" id="reset-password" placeholder="Create a new strong password" autocomplete="new-password" />
              <button type="button" class="toggle-pw" id="reset-toggle-pw" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="err-reset-password"></span>
          </div>
          <div class="form-group">
            <label for="reset-confirm">Confirm New Password</label>
            <div class="password-wrap">
              <input type="password" id="reset-confirm" placeholder="Re-enter your new password" autocomplete="new-password" />
            </div>
            <span class="field-error" id="err-reset-confirm"></span>
          </div>
          <button type="submit" class="btn-primary btn-full" id="save-reset-btn">Save New Password</button>
        </form>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    /* ── Inline logic for standalone reset-password page ── */
    const CONFIG_RP = {
      EMAILJS_SERVICE_ID:  'service_p32tpor',
      EMAILJS_TEMPLATE_ID: 'template_vjpbh3p',
      EMAILJS_PUBLIC_KEY:  'IJSM7Zp-wxJkkxVN7'
    };

    const $ = (sel, ctx = document) => ctx.querySelector(sel);
    const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

    let pendingResetEmail = null;
    let pendingCode       = null;

    function showToast(msg, type = 'info') {
      const c = $('#toast-container');
      if (!c) return;
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.innerHTML = `<span>${icons[type]||''}</span><span>${msg}</span>`;
      c.appendChild(t);
      setTimeout(() => { t.classList.add('toast-out'); t.addEventListener('animationend', () => t.remove(), { once: true }); }, 4000);
    }

    async function hashPassword(pw) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function getAccounts() {
      try { return JSON.parse(localStorage.getItem('cipher_accounts') || '[]'); } catch { return []; }
    }

    function findAccount(val) {
      const n = val.toLowerCase();
      return getAccounts().find(a => a.email.toLowerCase() === n || a.username.toLowerCase() === n);
    }

    function generateCode() {
      const arr = new Uint32Array(1);
      crypto.getRandomValues(arr);
      return String(100000 + (arr[0] % 900000));
    }

    async function sendVerificationEmail(toEmail, toName, code) {
      // Always show the code on screen for easy access
      $('#demo-code-hint')?.classList.remove('hidden');
      const v = $('#demo-code-value');
      if (v) v.textContent = code;

      const isConfigured = CONFIG_RP.EMAILJS_SERVICE_ID !== 'YOUR_SERVICE_ID' &&
                           CONFIG_RP.EMAILJS_PUBLIC_KEY  !== 'YOUR_PUBLIC_KEY';
      if (!isConfigured) return;
      try {
        if (typeof emailjs === 'undefined') throw new Error('EmailJS not loaded');
        emailjs.init(CONFIG_RP.EMAILJS_PUBLIC_KEY);
        await emailjs.send(CONFIG_RP.EMAILJS_SERVICE_ID, CONFIG_RP.EMAILJS_TEMPLATE_ID, {
          to_email: toEmail, to_name: toName, verification_code: code
        });
        showToast('Reset code also sent to ' + toEmail, 'success');
      } catch {
        // Code already shown on screen, nothing more to do
      }
    }

    function showStep(name) {
      ['step-email','step-verify','step-new-password'].forEach(id => {
        $(`#${id}`)?.classList.toggle('hidden', id !== name);
      });
    }

    async function handleForgotSubmit(e) {
      e.preventDefault();
      const email  = $('#forgot-email').value.trim();
      const errEl  = $('#err-forgot-email');

      if (!email) { if (errEl) errEl.textContent = 'Please enter your email address.'; return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { if (errEl) errEl.textContent = 'Please enter a valid email address.'; return; }
      if (errEl) errEl.textContent = '';

      const account = findAccount(email);
      if (!account) { if (errEl) errEl.textContent = 'No account found with that email address.'; return; }

      const btn = $('#send-reset-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }

      const code = generateCode();
      pendingResetEmail = account.email;
      pendingCode = code;

      $('#demo-code-hint')?.classList.add('hidden');
      const emailDisp = $('#verify-email-display');
      if (emailDisp) emailDisp.textContent = account.email;
      $$('.otp-box').forEach(b => { b.value = ''; b.classList.remove('filled'); });
      $('#err-otp').textContent = '';

      await sendVerificationEmail(account.email, account.username || account.email, code);
      if (btn) { btn.disabled = false; btn.textContent = 'Send Reset Code'; }
      showStep('step-verify');
    }

    function handleVerify() {
      const entered = $$('.otp-box').map(b => b.value).join('');
      const errEl = $('#err-otp');
      if (entered.length < 6) { if (errEl) errEl.textContent = 'Please enter all 6 digits.'; return; }
      if (entered !== pendingCode) {
        if (errEl) errEl.textContent = 'Incorrect code. Please try again.';
        $$('.otp-box').forEach(b => b.classList.add('error'));
        setTimeout(() => $$('.otp-box').forEach(b => b.classList.remove('error')), 600);
        return;
      }
      if (errEl) errEl.textContent = '';
      pendingCode = null;
      showStep('step-new-password');
    }

    async function handleResetPassword(e) {
      e.preventDefault();
      const password = $('#reset-password').value;
      const confirm  = $('#reset-confirm').value;

      let valid = true;
      const setErr = (id, msg) => { const el = $(`#${id}`); if (el) el.textContent = msg; if (msg) valid = false; };
      setErr('err-reset-password', password.length < 8 ? 'Password must be at least 8 characters.' : '');
      setErr('err-reset-confirm',  password !== confirm ? 'Passwords do not match.' : '');
      if (!valid) return;

      const passwordHash = await hashPassword(password);
      const accounts = getAccounts().map(a => {
        if (a.email.toLowerCase() === pendingResetEmail.toLowerCase()) {
          return { ...a, passwordHash };
        }
        return a;
      });
      localStorage.setItem('cipher_accounts', JSON.stringify(accounts));

      showToast('Password updated! Redirecting to sign in…', 'success');
      setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    }

    // OTP auto-advance
    $$('.otp-box').forEach((box, idx, boxes) => {
      box.addEventListener('input', () => {
        const val = box.value.replace(/\D/g,'');
        box.value = val;
        box.classList.toggle('filled', val.length > 0);
        if (val && idx < boxes.length - 1) boxes[idx + 1].focus();
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !box.value && idx > 0) {
          boxes[idx-1].focus(); boxes[idx-1].value = ''; boxes[idx-1].classList.remove('filled');
        }
      });
      box.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'');
        boxes.forEach((b,i) => { b.value = text[i]||''; b.classList.toggle('filled', !!text[i]); });
        boxes[Math.min(text.length, boxes.length-1)].focus();
      });
    });

    $('#forgot-form')?.addEventListener('submit', handleForgotSubmit);
    $('#verify-btn')?.addEventListener('click', handleVerify);
    $('#reset-form')?.addEventListener('submit', handleResetPassword);
    $('#reset-toggle-pw')?.addEventListener('click', () => {
      const pw = $('#reset-password');
      if (pw) pw.type = pw.type === 'text' ? 'password' : 'text';
    });
    $('#back-to-email-link')?.addEventListener('click', (e) => { e.preventDefault(); showStep('step-email'); });
    $('#resend-code-link')?.addEventListener('click', async (e) => {
      e.preventDefault();
      if (!pendingResetEmail || !pendingCode) return;
      const account = findAccount(pendingResetEmail);
      showToast('Resending code…', 'info');
      await sendVerificationEmail(pendingResetEmail, account?.username || pendingResetEmail, pendingCode);
    });
  </script>
</body>
</html>
