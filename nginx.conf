# ============================================================
# Cipher Music — Nginx Configuration
# ============================================================
#
# Features:
#   • Listens on both IPv4 (80/443) and IPv6 ([::]:80/[::]:443)
#   • Maintenance-mode flag file: /var/www/cipher-music/.maintenance
#     - When that file exists all traffic (except /admin) gets a 503
#     - Admin panel remains reachable so you can turn maintenance OFF
#   • Passes real client IP (including IPv6) to PHP-FPM via headers
#   • Works on mobile, iOS, Android, iPad, and all modern browsers
#
# Quick-start on Ubuntu (assumes PHP-FPM already installed):
#
#   sudo cp nginx.conf /etc/nginx/sites-available/cipher-music
#   sudo ln -s /etc/nginx/sites-available/cipher-music \
#              /etc/nginx/sites-enabled/cipher-music
#   sudo nginx -t && sudo systemctl reload nginx
#
# Maintenance mode toggle (from your Ubuntu terminal):
#
#   Enable:   sudo touch /var/www/cipher-music/.maintenance
#   Disable:  sudo rm  -f /var/www/cipher-music/.maintenance
#
# SSL: replace the self-signed cert paths below with your real
#   certificate paths (e.g. from Let's Encrypt / certbot).
# ============================================================

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;               # IPv6

    server_name _;                # catch-all; replace with your domain

    # Redirect everything to HTTPS
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;    # IPv6

    server_name _;                # replace with your domain, e.g. example.com

    root /var/www/cipher-music;
    index index.html index.php;

    # ── SSL (replace with your real cert paths) ──
    ssl_certificate     /etc/ssl/certs/cipher-music.crt;
    ssl_certificate_key /etc/ssl/private/cipher-music.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers (also improves mobile compatibility) ──
    add_header X-Frame-Options          "SAMEORIGIN"              always;
    add_header X-Content-Type-Options   "nosniff"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block"           always;
    # Strict-Transport-Security (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Pass real client IP (IPv4 or IPv6) to PHP-FPM ──────────
    # If you are behind another reverse-proxy or CDN, add its IP range here.
    set_real_ip_from  127.0.0.1;
    set_real_ip_from  ::1;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ── Maintenance mode ────────────────────────────────────────
    # Admin panel (/admin) is ALWAYS accessible so you can toggle
    # maintenance mode off via the web interface.
    # File-based toggle: touch /var/www/cipher-music/.maintenance
    set $maintenance 0;
    if (-f $document_root/.maintenance) {
        set $maintenance 1;
    }
    # Skip maintenance check for /admin paths
    if ($request_uri ~* "^/admin") {
        set $maintenance 0;
    }
    if ($maintenance = 1) {
        return 503;
    }
    error_page 503 @maintenance;
    location @maintenance {
        add_header Content-Type "text/html; charset=utf-8" always;
        return 503 '<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cipher Music — Maintenance</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0e0e1a;color:#e0e0e0;
         min-height:100vh;display:flex;align-items:center;justify-content:center;
         padding:24px;text-align:center}
    h1{font-size:2rem;color:#00d4ff;margin-bottom:12px}
    p{color:#888;max-width:420px}
  </style>
</head>
<body>
  <div>
    <h1>🔧 Under Maintenance</h1>
    <p>Cipher Music is temporarily offline for maintenance.<br>
       Please check back shortly.</p>
  </div>
</body>
</html>';
    }

    # ── PHP-FPM ──────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass   unix:/run/php/php8.1-fpm.sock;  # adjust PHP version as needed
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Pass real client IP to PHP ($_SERVER['HTTP_X_REAL_IP'])
        fastcgi_param  HTTP_X_REAL_IP  $remote_addr;
    }

    # ── Static files ─────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot|json|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Protect admin/data directory ─────────────────────────────
    location ~* ^/admin/data/ {
        deny all;
        return 403;
    }

    # ── Protect hidden files ──────────────────────────────────────
    location ~ /\. {
        deny all;
    }

    # ── Default file handling ─────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip compression (better performance on mobile) ──────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml text/javascript
                    application/javascript application/json application/xml
                    image/svg+xml;
}
