# =============================================================================
# Cipher Music — Nginx Configuration
# Supports: IPv4 + IPv6, maintenance mode, mobile/iOS/iPad, admin always-on
# =============================================================================
# Install: sudo cp nginx.conf /etc/nginx/sites-available/cipher-music
#          sudo ln -s /etc/nginx/sites-available/cipher-music \
#                     /etc/nginx/sites-enabled/cipher-music
#          sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

server {
    # ── IPv4 + IPv6 listeners ─────────────────────────────────────────────────
    listen      80;
    listen      [::]:80;

    # HTTPS (uncomment after obtaining a TLS cert with certbot)
    # listen      443 ssl http2;
    # listen      [::]:443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    server_name  YOUR_DOMAIN www.YOUR_DOMAIN;

    root  /var/www/cipher-music/php/public;
    index index.php;

    # ── Logging with real IP (works for both IPv4 and IPv6) ───────────────────
    # If behind a proxy, uncomment and set the proxy IP:
    # set_real_ip_from  10.0.0.0/8;
    # real_ip_header    X-Forwarded-For;
    # real_ip_recursive on;

    access_log /var/log/nginx/cipher-music-access.log;
    error_log  /var/log/nginx/cipher-music-error.log;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-Frame-Options          "SAMEORIGIN"    always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Mobile / responsive ───────────────────────────────────────────────────
    # No special Nginx directives needed; responsive design is handled in CSS.
    # Ensure content-type is correct for all assets.
    charset utf-8;

    # ── Maintenance mode ──────────────────────────────────────────────────────
    # Maintenance is controlled by the existence of /var/www/cipher-music/php/maintenance.flag
    # (created/removed by the PHP admin panel and the shell script).
    #
    # IMPORTANT: /admin/* is ALWAYS exempt from maintenance mode.

    set $maintenance 0;

    # Check for maintenance flag file
    if (-f /var/www/cipher-music/php/maintenance.flag) {
        set $maintenance 1;
    }

    # Admin panel is always accessible — clear maintenance flag for /admin paths
    if ($request_uri ~* "^/admin") {
        set $maintenance 0;
    }

    # API is always accessible (uses Bearer token auth)
    if ($request_uri ~* "^/api") {
        set $maintenance 0;
    }

    # Serve maintenance page when flag is set
    if ($maintenance = 1) {
        return 503;
    }

    error_page 503 /maintenance.php;

    # ── Static assets ─────────────────────────────────────────────────────────
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Admin panel ───────────────────────────────────────────────────────────
    location /admin/ {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    # ── REST API ──────────────────────────────────────────────────────────────
    location /api/ {
        try_files $uri $uri/ /api/index.php?$query_string;

        # CORS headers for remote API access
        add_header Access-Control-Allow-Origin  "*"                                           always;
        add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS"                  always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept"         always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # ── Main app ──────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────────
    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.2-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   $realpath_root;

        # Pass real client IP to PHP
        fastcgi_param  REMOTE_ADDR     $remote_addr;
        fastcgi_param  HTTP_X_REAL_IP  $remote_addr;

        # Hide PHP version
        fastcgi_hide_header X-Powered-By;

        # Timeouts
        fastcgi_read_timeout  120s;
        fastcgi_send_timeout  120s;
        fastcgi_connect_timeout 10s;
    }

    # ── Deny sensitive files ──────────────────────────────────────────────────
    location ~ /\.(ht|git|env) {
        deny all;
    }

    location ~* \.(sql|sh|log|flag)$ {
        deny all;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
    gzip_vary on;
}

